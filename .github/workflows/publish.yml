name: Publish to npm

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version to publish (e.g., 0.0.2)"
        required: true

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      # Set package version from git tag (v1.2.3 -> 1.2.3) or manual input
      - name: Set version
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION="${GITHUB_REF_NAME#v}"
          fi
          echo "Publishing version: $VERSION"
          npm version "$VERSION" --no-git-tag-version

      - run: npm ci

      - run: npm run build

      # Inject OAuth credentials into the build output.
      # Baked into the npm package so customers just run --setup and authorize.
      # NOT in the git repo (build/ is gitignored), IS in the npm package.
      - name: Inject OAuth defaults
        run: |
          echo '{"clientId":"${{ secrets.GOOGLE_CLIENT_ID }}","clientSecret":"${{ secrets.GOOGLE_CLIENT_SECRET }}"}' > build/defaults.json

      - run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
