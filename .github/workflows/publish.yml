name: Publish to npm

on:
  release:
    types: [published]

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      - run: npm ci

      - run: npm run build

      # Inject OAuth credentials into the build output.
      # These are baked into the npm package so customers don't need
      # their own Google Cloud project — they just run --setup and authorize.
      # The defaults.json file is NOT in the git repo (build/ is gitignored),
      # but IS in the npm package (package.json files: ["build/"]).
      - name: Inject OAuth defaults
        run: |
          echo '{"clientId":"${{ secrets.GOOGLE_CLIENT_ID }}","clientSecret":"${{ secrets.GOOGLE_CLIENT_SECRET }}"}' > build/defaults.json

      - run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
